apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-widget-generator
  namespace: ai-widget-generator
  labels:
    app: ai-widget-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-widget-generator
  template:
    metadata:
      labels:
        app: ai-widget-generator
    spec:
      containers:
        - name: ai-widget-generator
          image: docker.io/nyrahul/ai-widget-generator:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
